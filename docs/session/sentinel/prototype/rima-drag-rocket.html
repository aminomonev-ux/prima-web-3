<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Purwarupa — Rima Drag &amp; Drop "Roket Lepas Landas"</title>
<!--
  PURWARUPA / PROTOTYPE — bukan kode produksi.
  Animasi terbang maskot RIMA saat di-drag (opsi B "Roket Lepas Landas").
  - Kaki -> nozzle bell roket + api berlapis (inti putih-biru, oranye, merah).
  - Seluruh kepala+badan berputar 360 derajat menghadap arah drag (atan2 vektor kecepatan).
  - Lepas drag -> mendarat tegak (rot balik 0, snap ke home).
  SVG maskot = salinan persis components/sentinel/RimaAvatar.tsx + tambahan nozzle/flame.
  Token warna = docs/design/DESIGN-SYSTEM.md (amber #EF9F27, danger #E24B4A, canvas #020F1C, surface #042C53).
  Cara pakai: buka file ini di browser. Seret Rima, atau klik "Putar 2 dtk".
  Detail handoff implementasi -> docs/session/sentinel/prototype/HANDOFF-rima-drag.md
-->
<style>
  html,body{margin:0;background:#020F1C;font-family:Inter,system-ui,sans-serif;color:#E6F1FB}
  .stage{max-width:680px;margin:24px auto;padding:0 16px}
  .opt-card{background:#042C53;border:0.5px solid rgba(230,241,251,.18);border-radius:14px;padding:14px}
  .opt-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .opt-name{font-size:15px;font-weight:500}
  .opt-tag{font-size:12px;color:#9FB3C8;margin-top:8px}
  .opt-btn{background:#EF9F27;color:#412402;border:none;border-radius:6px;padding:7px 12px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
  .opt-btn:active{transform:scale(.97)}
  .zone{position:relative;height:300px;border-radius:10px;background:radial-gradient(120% 120% at 50% 50%,#0a2238 0%,#020F1C 72%);overflow:hidden;touch-action:none;cursor:grab}
  .zone.grab{cursor:grabbing}
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(120,160,200,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(120,160,200,.06) 1px,transparent 1px);background-size:26px 26px}
  .hint{position:absolute;left:12px;bottom:8px;font-size:11px;color:#5f7790}
  .rwrap{position:absolute;left:50%;top:55%;width:66px;height:95px;margin-left:-33px;margin-top:-47px;transition:left .5s cubic-bezier(.34,1.4,.5,1),top .5s cubic-bezier(.34,1.4,.5,1)}
  .rwrap.drag{transition:none}
  .pose{width:100%;height:100%;transform:rotate(var(--rot,0deg));transition:transform .16s ease-out}
  .streaks{position:absolute;left:50%;top:88px;width:10px;height:70px;margin-left:-5px;opacity:0;transition:opacity .15s}
  .flying .streaks{opacity:1}
  .streaks i{position:absolute;left:50%;width:3px;border-radius:2px;background:linear-gradient(#7FB6F0,transparent);animation:trail .5s linear infinite}
  .streaks i:nth-child(1){height:30px;margin-left:-7px;animation-delay:0s}
  .streaks i:nth-child(2){height:44px;margin-left:-1px;animation-delay:.16s;background:linear-gradient(#EF9F27,transparent)}
  .streaks i:nth-child(3){height:26px;margin-left:5px;animation-delay:.3s}
  @keyframes trail{0%{transform:translateY(-14px);opacity:0}30%{opacity:.85}100%{transform:translateY(34px);opacity:0}}
  svg.rima-avatar{width:66px;height:95px;display:block}
  .foot{transition:opacity .1s}
  .flying .foot{opacity:0}
  .nozzle,.flame-g{opacity:0;transition:opacity .12s}
  .flying .nozzle{opacity:1}
  .flying .flame-g{opacity:1;transform-box:view-box}
  .flying .flame-l{animation:fl .16s linear infinite;transform-origin:48.5px 131px}
  .flying .flame-r{animation:fl .16s linear infinite .08s;transform-origin:71.5px 131px}
  @keyframes fl{0%{transform:scaleY(.8)}50%{transform:scaleY(1.22)}100%{transform:scaleY(.86)}}
  .flying .rima-float{animation:none!important}
  @media (prefers-reduced-motion: reduce){
    .flying .flame-l,.flying .flame-r,.streaks i{animation:none}
    .pose{transition:transform .25s ease-out}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="opt-card">
    <div class="opt-head">
      <div class="opt-name">Opsi B — Roket Lepas Landas</div>
      <button class="opt-btn" id="playB">&#9654; Putar 2 dtk</button>
    </div>
    <div class="zone" id="zoneB">
      <div class="grid-bg"></div>
      <div class="rwrap" id="wB">
        <div class="pose opt-rocket">
          <span class="streaks"><i></i><i></i><i></i></span>
          <span class="rimaholder"></span>
        </div>
      </div>
      <span class="hint">seret Rima ke segala arah — kepala memimpin, api menyembur ke belakang</span>
    </div>
    <div class="opt-tag">Kaki &rarr; nozzle bell ber-api (inti putih-biru, oranye, merah). Seluruh badan &amp; kepala berputar 360&deg; menghadap arah gerak; lepas &rarr; mendarat tegak.</div>
  </div>
</div>

<script>
function avatar(s){
  return '<svg viewBox="0 0 120 172" class="rima-avatar" xmlns="http://www.w3.org/2000/svg" style="color:#EF9F27" aria-hidden="true">'+
  '<defs><linearGradient id="b'+s+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset=".72" stop-color="#EDF2F8"/><stop offset="1" stop-color="#CBD8E4"/></linearGradient>'+
  '<radialGradient id="v'+s+'" cx=".5" cy=".3" r="1"><stop offset="0" stop-color="#11304E"/><stop offset="1" stop-color="#020F1C"/></radialGradient>'+
  '<linearGradient id="fo'+s+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFD27A"/><stop offset=".4" stop-color="#EF9F27"/><stop offset=".75" stop-color="#E24B4A"/><stop offset="1" stop-color="#E24B4A" stop-opacity="0"/></linearGradient>'+
  '<linearGradient id="fi'+s+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset=".5" stop-color="#BFE0FF"/><stop offset="1" stop-color="#7FB6F0" stop-opacity="0"/></linearGradient>'+
  '<linearGradient id="noz'+s+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#AFC2D4"/><stop offset="1" stop-color="#5E6E7E"/></linearGradient></defs>'+
  '<ellipse class="rima-shadow" cx="60" cy="150" rx="25" ry="4.5" fill="#000" opacity=".18"/>'+
  '<g class="rima-float">'+
  '<g class="rima-antena"><line x1="44" y1="16" x2="40" y2="6" stroke="#9FB3C8" stroke-width="2.5" stroke-linecap="round"/><circle cx="39.5" cy="5" r="3.4" fill="currentColor"/></g>'+
  '<g class="rima-antena rima-antena-r"><line x1="76" y1="16" x2="80" y2="6" stroke="#9FB3C8" stroke-width="2.5" stroke-linecap="round"/><circle cx="80.5" cy="5" r="3.4" fill="currentColor"/></g>'+
  '<g class="rima-arm rima-arm-l"><rect x="19" y="80" width="11" height="27" rx="5.5" fill="url(#b'+s+')" stroke="#AFC2D4" stroke-width="1"/><circle cx="24.5" cy="108" r="5" fill="#E6EDF5" stroke="#AFC2D4" stroke-width="1"/><rect x="12" y="104" width="11" height="5" rx="2.5" fill="#E6EDF5" stroke="#AFC2D4" stroke-width="1"/></g>'+
  '<g class="rima-arm rima-arm-r"><rect x="90" y="80" width="11" height="27" rx="5.5" fill="url(#b'+s+')" stroke="#AFC2D4" stroke-width="1"/><circle cx="95.5" cy="108" r="5" fill="#E6EDF5" stroke="#AFC2D4" stroke-width="1"/><rect x="97" y="104" width="11" height="5" rx="2.5" fill="#E6EDF5" stroke="#AFC2D4" stroke-width="1"/></g>'+
  '<g class="flame-g flame-l"><path d="M44 131 Q41 150 48.5 168 Q56 150 53 131 Z" fill="url(#fo'+s+')"/><path d="M46 132 Q44.5 146 48.5 159 Q52.5 146 51 132 Z" fill="url(#fi'+s+')"/></g>'+
  '<g class="flame-g flame-r"><path d="M67 131 Q64 150 71.5 168 Q79 150 76 131 Z" fill="url(#fo'+s+')"/><path d="M69 132 Q67.5 146 71.5 159 Q75.5 146 74 132 Z" fill="url(#fi'+s+')"/></g>'+
  '<g class="nozzle"><path d="M45 116 L52 116 L55 131 L42 131 Z" fill="url(#noz'+s+')" stroke="#4A5965" stroke-width="1"/><ellipse cx="48.5" cy="131" rx="6.5" ry="2.2" fill="#34404A"/>'+
  '<path d="M68 116 L75 116 L78 131 L65 131 Z" fill="url(#noz'+s+')" stroke="#4A5965" stroke-width="1"/><ellipse cx="71.5" cy="131" rx="6.5" ry="2.2" fill="#34404A"/></g>'+
  '<rect x="33" y="74" width="54" height="45" rx="17" fill="url(#b'+s+')" stroke="#AFC2D4" stroke-width="1"/>'+
  '<rect x="39" y="78" width="14" height="22" rx="7" fill="#FFFFFF" opacity=".65"/>'+
  '<circle cx="60" cy="97" r="10.5" fill="#EF9F27"/><text x="60" y="101.5" text-anchor="middle" font-size="13" font-weight="800" fill="#FFFFFF" font-family="Inter,sans-serif">P</text>'+
  '<rect class="foot" x="42" y="118" width="13" height="11" rx="5.5" fill="#D5DFE9" stroke="#AFC2D4" stroke-width="1"/><rect class="foot" x="65" y="118" width="13" height="11" rx="5.5" fill="#D5DFE9" stroke="#AFC2D4" stroke-width="1"/>'+
  '<rect x="17" y="14" width="86" height="58" rx="27" fill="url(#b'+s+')" stroke="#AFC2D4" stroke-width="1"/>'+
  '<ellipse cx="40" cy="25" rx="16" ry="7" fill="#FFFFFF" opacity=".75"/>'+
  '<circle cx="15" cy="43" r="6.5" fill="#C3CFDB" stroke="#AFC2D4" stroke-width="1"/><circle cx="105" cy="43" r="6.5" fill="#C3CFDB" stroke="#AFC2D4" stroke-width="1"/>'+
  '<rect x="27" y="25" width="66" height="37" rx="18.5" fill="url(#v'+s+')"/>'+
  '<circle cx="46" cy="42" r="9" fill="none" stroke="currentColor" stroke-width="4" opacity=".3"/><circle cx="74" cy="42" r="9" fill="none" stroke="currentColor" stroke-width="4" opacity=".3"/>'+
  '<circle cx="46" cy="42" r="6" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="74" cy="42" r="6" fill="none" stroke="currentColor" stroke-width="3"/>'+
  '<rect x="54" y="52" width="12" height="3.5" rx="1.75" fill="currentColor"/>'+
  '</g></svg>';
}
document.querySelector('.rimaholder').innerHTML=avatar('z');

var zone=document.getElementById('zoneB'), w=document.getElementById('wB'), pose=w.querySelector('.pose');
var homeL,homeT,dragging=false,raf,lastX=0,lastY=0,lastT=0,cur=0,target=0;
function home(){var r=zone.getBoundingClientRect();homeL=r.width*0.5;homeT=r.height*0.55;}
home();w.style.left=homeL+'px';w.style.top=homeT+'px';
window.addEventListener('resize',function(){if(!dragging&&!raf){home();w.style.left=homeL+'px';w.style.top=homeT+'px';}});
function norm(a){while(a>180)a-=360;while(a<-180)a+=360;return a;}
function applyAngle(){pose.style.setProperty('--rot',cur.toFixed(1)+'deg');}
function aim(vx,vy){var sp=Math.hypot(vx,vy);if(sp<0.04)return;target=Math.atan2(vy,vx)*180/Math.PI+90;cur=cur+norm(target-cur)*0.4;applyAngle();}
function down(e){if(raf)return;dragging=true;zone.classList.add('grab');w.classList.add('drag');pose.classList.add('flying');lastX=e.clientX;lastY=e.clientY;lastT=performance.now();try{w.setPointerCapture(e.pointerId);}catch(_){}}
function move(e){if(!dragging)return;var r=zone.getBoundingClientRect();var x=e.clientX-r.left,y=e.clientY-r.top;w.style.left=Math.max(20,Math.min(r.width-20,x))+'px';w.style.top=Math.max(24,Math.min(r.height-24,y))+'px';var now=performance.now(),dt=Math.max(8,now-lastT);aim((e.clientX-lastX)/dt*16,(e.clientY-lastY)/dt*16);lastX=e.clientX;lastY=e.clientY;lastT=now;}
function up(){if(!dragging)return;dragging=false;zone.classList.remove('grab');w.classList.remove('drag');pose.classList.remove('flying');cur=0;target=0;applyAngle();home();w.style.left=homeL+'px';w.style.top=homeT+'px';}
w.addEventListener('pointerdown',down);window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
document.getElementById('playB').addEventListener('click',function(){
  if(dragging||raf)return;home();var r=zone.getBoundingClientRect();var cx=r.width*0.5,cy=r.height*0.5,rad=Math.min(r.width,r.height)*0.3;
  pose.classList.add('flying');w.classList.add('drag');cur=0;applyAngle();var t0=performance.now(),dur=2000;
  function step(t){var p=(t-t0)/dur;if(p>=1){pose.classList.remove('flying');w.classList.remove('drag');cur=0;applyAngle();home();w.style.left=homeL+'px';w.style.top=homeT+'px';raf=null;return;}
    var a=-Math.PI/2+p*2*Math.PI;var x=cx+rad*Math.cos(a),y=cy+rad*Math.sin(a);w.style.left=x+'px';w.style.top=y+'px';
    var vx=-Math.sin(a),vy=Math.cos(a);target=Math.atan2(vy,vx)*180/Math.PI+90;cur=cur+norm(target-cur)*0.5;applyAngle();raf=requestAnimationFrame(step);}
  raf=requestAnimationFrame(step);});
</script>
</body>
</html>
